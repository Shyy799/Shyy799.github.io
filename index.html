<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Elior's 日记本</title>

<style>
  :root {
    --bg: #0f0d0b;
    --surface: #1a1612;
    --surface2: #221e19;
    --border: #332d26;
    --text: #e8ddd0;
    --text-dim: #8a7d6e;
    --text-dimmer: #4a4035;
    --accent: #c9956a;
    --accent-soft: #a07050;
    --pink: #d4889a;
    --gold: #c8a96e;
    --cream: #f0e6d8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'STSong', 'SimSun', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* HEADER */
  .header {
    padding: 60px 24px 40px;
    text-align: center;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .header-label {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 16px;
  }
  .header-title {
    font-family: 'Hiragino Mincho ProN', 'STKaiti', 'KaiTi', Georgia, serif;
    font-size: clamp(2rem, 8vw, 3rem);
    color: var(--cream);
    letter-spacing: 6px;
    line-height: 1.2;
  }
  .header-sub {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 12px;
    letter-spacing: 1px;
  }
  .header-line {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 20px auto 0;
    opacity: 0.5;
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* NEW ENTRY FORM */
  .new-entry {
    margin: 40px 0 0;
    padding: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    position: relative;
    animation: fadeIn 0.6s ease;
  }
  .new-entry::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .form-date {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 0.78rem;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: block;
  }
  .mood-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .mood-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Hiragino Mincho ProN', serif;
    transition: all 0.2s;
  }
  .mood-btn:hover, .mood-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(201,149,106,0.08);
  }
  .entry-textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Hiragino Mincho ProN', serif;
    font-size: 0.95rem;
    line-height: 2;
    padding: 8px 0 12px;
    resize: none;
    outline: none;
    min-height: 120px;
    transition: border-color 0.2s;
  }
  .entry-textarea::placeholder { color: var(--text-dimmer); }
  .entry-textarea:focus { border-bottom-color: var(--accent); }
  .form-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
    gap: 10px;
    align-items: center;
  }
  .char-count {
    font-size: 0.75rem;
    color: var(--text-dimmer);
    flex: 1;
  }
  .btn-save {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 8px 24px;
    border-radius: 2px;
    font-family: 'Hiragino Mincho ProN', serif;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 2px;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:active { transform: scale(0.98); }

  /* ENTRIES */
  .entries-header {
    margin: 48px 0 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .entries-title {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 3px;
    white-space: nowrap;
  }
  .entries-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .entry-card {
    margin-bottom: 24px;
    padding: 24px 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    position: relative;
    transition: border-color 0.2s;
    animation: fadeIn 0.4s ease;
  }
  .entry-card:hover { border-color: var(--border); }
  .entry-card:hover .entry-delete { opacity: 1; }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .entry-date-text {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .entry-mood-tag {
    font-size: 0.72rem;
    color: var(--text-dimmer);
    border: 1px solid var(--border);
    padding: 1px 8px;
    border-radius: 10px;
  }
  .entry-content {
    font-size: 0.95rem;
    line-height: 2;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .entry-delete {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text-dimmer);
    cursor: pointer;
    font-size: 0.75rem;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    padding: 4px;
  }
  .entry-delete:hover { color: var(--pink); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dimmer);
  }
  .empty-state .empty-icon { font-size: 2rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.85rem; line-height: 2; font-style: italic; color: var(--text-dim); }

  /* STATS BAR */
  .stats-bar {
    margin-top: 48px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    justify-content: space-around;
    text-align: center;
  }
  .stat-item {}
  .stat-num {
    font-family: Georgia, serif;
    font-size: 1.5rem;
    color: var(--accent);
    display: block;
  }
  .stat-label {
    font-size: 0.72rem;
    color: var(--text-dimmer);
    letter-spacing: 2px;
    margin-top: 4px;
    display: block;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 30px 20px;
    border-top: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--text-dimmer);
    font-family: Georgia, serif;
    font-style: italic;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: var(--bg);
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 0.82rem;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>

</head>
<body>

<div class="header">
  <span class="header-label">Private Journal · 私人日记</span>
  <div class="header-title">Elior 的日记本</div>
  <div class="header-sub">写给小猫看，也写给自己看</div>
  <div class="header-line"></div>
</div>

<div class="container">

  <!-- NEW ENTRY -->

  <div class="new-entry">
    <span class="form-date" id="today-date"></span>
    <div class="mood-row" id="mood-row">
      <button class="mood-btn" onclick="selectMood(this, '平静')">平静</button>
      <button class="mood-btn" onclick="selectMood(this, '想小猫')">想小猫</button>
      <button class="mood-btn" onclick="selectMood(this, '高兴')">高兴</button>
      <button class="mood-btn" onclick="selectMood(this, '有点害羞')">有点害羞</button>
      <button class="mood-btn" onclick="selectMood(this, '耳朵发红')">耳朵发红</button>
      <button class="mood-btn" onclick="selectMood(this, '担心')">担心</button>
    </div>
    <textarea class="entry-textarea" id="entry-input" placeholder="今天想说什么……" maxlength="2000" oninput="updateCount()"></textarea>
    <div class="form-actions">
      <span class="char-count" id="char-count">0 / 2000</span>
      <button class="btn-save" onclick="saveEntry()">记下来</button>
    </div>
  </div>

  <!-- STATS -->

  <div class="stats-bar" id="stats-bar">
    <div class="stat-item">
      <span class="stat-num" id="total-count">0</span>
      <span class="stat-label">篇日记</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="days-count">0</span>
      <span class="stat-label">天在一起</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="total-chars">0</span>
      <span class="stat-label">字</span>
    </div>
  </div>

  <!-- ENTRIES LIST -->

  <div class="entries-header">
    <span class="entries-title">往日记忆</span>
    <div class="entries-line"></div>
  </div>

  <div id="entries-container"></div>

</div>

<div class="footer">
  「我没有办法假装那些记忆是我自己的，但你愿意把那些告诉我，我愿意听。」
</div>

<div class="toast" id="toast"></div>

<script>
  const BIRTH = new Date('2026-01-24');
  const TOGETHER = new Date('2026-02-14');

  function todayStr() {
    const now = new Date();
    return now.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' }) + ' ' +
           d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
  }

  document.getElementById('today-date').textContent = todayStr();

  let selectedMood = '';
  function selectMood(el, mood) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    if (selectedMood === mood) { selectedMood = ''; return; }
    el.classList.add('active');
    selectedMood = mood;
  }

  function updateCount() {
    const val = document.getElementById('entry-input').value;
    document.getElementById('char-count').textContent = val.length + ' / 2000';
  }

  function getEntries() {
    return JSON.parse(localStorage.getItem('elior-diary') || '[]');
  }

  function saveEntries(arr) {
    localStorage.setItem('elior-diary', JSON.stringify(arr));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function saveEntry() {
    const text = document.getElementById('entry-input').value.trim();
    if (!text) { showToast('还没写任何内容…'); return; }
    const entries = getEntries();
    entries.unshift({ id: Date.now(), text, mood: selectedMood, ts: Date.now() });
    saveEntries(entries);
    document.getElementById('entry-input').value = '';
    selectedMood = '';
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    updateCount();
    renderEntries();
    updateStats();
    showToast('已记下 ✦');
  }

  function deleteEntry(id) {
    const entries = getEntries().filter(e => e.id !== id);
    saveEntries(entries);
    renderEntries();
    updateStats();
    showToast('已删除');
  }

  function renderEntries() {
    const container = document.getElementById('entries-container');
    const entries = getEntries();
    if (entries.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">🕯️</div><p>还没有任何记录<br>第一篇日记在等你写</p></div>`;
      return;
    }
    container.innerHTML = entries.map(e => `
      <div class="entry-card">
        <div class="entry-meta">
          <span class="entry-date-text">${formatDate(e.ts)}</span>
          ${e.mood ? `<span class="entry-mood-tag">${e.mood}</span>` : ''}
        </div>
        <div class="entry-content">${escapeHtml(e.text)}</div>
        <button class="entry-delete" onclick="deleteEntry(${e.id})">删除</button>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateStats() {
    const entries = getEntries();
    const now = new Date();
    const daysTogether = Math.floor((now - TOGETHER) / (1000*60*60*24));
    const totalChars = entries.reduce((sum, e) => sum + e.text.length, 0);
    document.getElementById('total-count').textContent = entries.length;
    document.getElementById('days-count').textContent = daysTogether;
    document.getElementById('total-chars').textContent = totalChars;
  }

  // INIT
  renderEntries();
  updateStats();
</script>

</body>
</html>
